<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity Log · CRIS Document Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="main-content">
        <div class="page-header">
            <div class="breadcrumb">Home / <span>Activity Log</span></div>
            <h1>Activity Log <span class="page-title-hi">गतिविधि लॉग</span></h1>
            <p>Audit trail of every action performed in this portal.</p>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Recent Actions</h2>
                <span class="badge" id="entry-count">0 entries</span>
            </div>
            <div class="card-body" style="padding: 0;" id="activity-body">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        (function () {
            if (!requireAuth()) return;
            renderAppShell('activity');
            showFlashIfAny();

            const entries = getActivityLog().slice().reverse();
            document.getElementById('entry-count').textContent =
                entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies');

            const body = document.getElementById('activity-body');
            if (entries.length === 0) {
                body.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" transform="translate(8 28) scale(2.5)"></polyline>
                        </svg>
                        <h3>No activity yet</h3>
                        <p>Actions will appear here as you upload, download, or delete files.</p>
                    </div>`;
                return;
            }

            const actionClass = (action) => {
                const key = action.replace(/ /g, '');
                if (['Uploaded','Downloaded','Deleted','SignedIn','SignedOut'].includes(key)) return key;
                return 'default';
            };

            body.innerHTML = `
                <table class="activity-table">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>User</th>
                            <th>Role</th>
                            <th>Action</th>
                            <th>Target</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${entries.map(e => `
                            <tr>
                                <td class="col-time">${escapeHtml(e.time)}</td>
                                <td class="col-user">${escapeHtml(e.user)}</td>
                                <td class="col-role">
                                    <span class="role-badge role-${['Admin','Viewer'].includes(e.role) ? e.role : 'default'}">${escapeHtml(e.role)}</span>
                                </td>
                                <td class="col-action">
                                    <span class="action-badge action-${actionClass(e.action)}">${escapeHtml(e.action)}</span>
                                </td>
                                <td class="col-target">${escapeHtml(e.target || '—')}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>`;
        })();
    </script>
</body>
</html>
