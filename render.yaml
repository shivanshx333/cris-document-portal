services:
  - type: web
    name: cris-document-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd file-manager && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
